<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catch-a-Cat Warden</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="hud">
      <div class="badge">⏱️ Time: <span id="time">60</span>s</div>
      <div class="badge">🐾 Score: <span id="score">0</span></div>
      <div class="badge controls">Move: WASD / Arrows • Cast Net: Space</div>
    </div>

    <main id="viewport">
      <div id="world" aria-label="park world"></div>
    </main>

    <div class="mobile-controls" aria-label="touch controls">
      <div class="dpad" role="group" aria-label="movement buttons">
        <button class="touch-btn up" data-key="arrowup" aria-label="Move up">▲</button>
        <button class="touch-btn left" data-key="arrowleft" aria-label="Move left">◀</button>
        <button class="touch-btn right" data-key="arrowright" aria-label="Move right">▶</button>
        <button class="touch-btn down" data-key="arrowdown" aria-label="Move down">▼</button>
      </div>
      <button class="touch-btn cast" data-key=" " aria-label="Cast net">NET</button>
    </div>

    <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true">
      <div class="panel">
        <h1>Time's Up!</h1>
        <p>You caught <span id="finalScore">0</span> kittens.</p>
        <button id="restart">Play Again</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
